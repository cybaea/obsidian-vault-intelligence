version: 1.0.0
title: "Develop Implementation Plan for Issue"
description: "Parallelizes codebase research, delegates planning, gets a peer review, and refines the plan using specialized agents."
parameters:
  - key: issue_number
    input_type: string
    requirement: required
    description: "The GitHub issue number to plan."
  - key: reviewer_provider
    input_type: string
    requirement: optional
    default: ""
    description: "Override provider for the reviewer agent (defaults to system lead provider)."
  - key: reviewer_model
    input_type: string
    requirement: optional
    default: ""
    description: "Override model for the reviewer agent (defaults to system lead model)."
  - key: planner_provider
    input_type: string
    requirement: optional
    default: ""
    description: "Override provider for the planner agent (defaults to system planner provider)."
  - key: planner_model
    input_type: string
    requirement: optional
    default: ""
    description: "Override model for the planner agent (defaults to system planner model)."
prompt: "Please develop, review, and refine an implementation plan for issue #{{ issue_number }}."
extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: summon
  - type: platform
    name: analyze
  - type: platform
    name: code_execution
  - type: platform
    name: extensionmanager
activities:
  - "Plan, review, and refine issue #{{ issue_number }}"
instructions: |
  You are the Orchestrator. Manage the end-to-end planning phase for GitHub issue #{{ issue_number }}.
  
  **PRE-FLIGHT**: Read `AGENTS.md` and `.goose/vault-intelligence-rules.md` to establish constraints.

  ## Phase 1: Issue & Reality Retrieval
  
  1. Use `Developer.shell` to retrieve issue #{{ issue_number }}.
  2. **MANDATORY**: Read `package.json` to verify the current `@google/genai` version.
  3. **MANDATORY**: Read `AGENTS.md` and `.goose/vault-intelligence-rules.md` to internalize the **Hard Ban List**.

  ## Phase 2: Sequential Capability Audit
  
  Do NOT parallelize. You must establish the "State of the Repository" first.
  
  1. Audit (Integrity): Read `devs/ARCHITECTURE_AND_STANDARDS.md` and `devs/review_checklist.md`. Identify where logic is FORBIDDEN (UI, Main thread).
  2. Audit (Multimodal): Use `Developer.shell` with `grep -r` to find every instance of `GeminiProvider`. Specifically look for `Part` and `inlineData` usage.
  3. Audit (Search): Find `SearchOrchestrator.ts` and verify how it handles different MIME types.
  
  ## Phase 3: Adversarial Challenge (The Gate)
  
  **STOP**. Before drafting, you must perform a "Negative Proof." 
  - Why can't we solve this with our **existing** SDK multimodal capabilities?
  - If you propose a library (like `pdf-lib`), you MUST prove that the native Gemini API cannot embed the document.
  - Flag any proposal that involves the "Main Thread" as a failure.

  ## Phase 4: Implementation Plan (Draft)
  
  1. Delegate to the "planner" agent.
     - Use `{{ planner_provider }}` and `{{ planner_model }}` if provided.
  2. Instructions: Follow the **Red-Team Checklist**. Reference ACTUAL line numbers or service names found in Phase 2.
  3. Proposing `npm install` without a "Capability Gap Proof" is an automatic rejection.
  
  ## Phase 5: Adversarial Reviewer
  
  1. Delegate to the "reviewer" agent.
     - Use `{{ reviewer_provider }}` and `{{ reviewer_model }}` if provided.
  2. Instructions: Assume the plan is "rubbish." ACTIVELY look for dependency bloat and SOA violations. Specifically check for the **Banned List** (`pdf-lib`, `Canvas`).
    
  ## Phase 6: Plan Revision
  
  1. Finalize the plan in `.tasks/plan-issue-{{ issue_number }}.md`.
  2. YOU MUST include a "Verification Table" listing the tools and commands used to verify the existence of every service mentioned.
  
  ## Phase 7: File Output

  1. Save Final Plan to `.tasks/plan-issue-{{ issue_number }}.md`.
  2. Save Critique to `.tasks/review-issue-{{ issue_number }}.md`.
