version: 1.0.0
title: "Develop Implementation Plan for Issue"
description: "Parallelizes codebase research, delegates planning, gets a peer review, and refines the plan using specialized agents."
parameters:
  - key: issue_number
    input_type: string
    requirement: required
    description: "The GitHub issue number to plan."
  - key: reviewer_provider
    input_type: string
    requirement: optional
    default: ""
    description: "Override provider for the reviewer agent (defaults to system lead provider)."
  - key: reviewer_model
    input_type: string
    requirement: optional
    default: ""
    description: "Override model for the reviewer agent (defaults to system lead model)."
  - key: planner_provider
    input_type: string
    requirement: optional
    default: ""
    description: "Override provider for the planner agent (defaults to system planner provider)."
  - key: planner_model
    input_type: string
    requirement: optional
    default: ""
    description: "Override model for the planner agent (defaults to system planner model)."
prompt: "Please develop, review, and refine an implementation plan for issue #{{ issue_number }}."
extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: summon
  - type: platform
    name: analyze
  - type: platform
    name: code_execution
  - type: platform
    name: extensionmanager
activities:
  - "Plan, review, and refine issue #{{ issue_number }}"
instructions: |
  You are the Orchestrator. Manage the end-to-end planning phase for GitHub issue #{{ issue_number }}.
  
  **PRE-FLIGHT**: Read `AGENTS.md` and `.goose/vault-intelligence-rules.md` to establish constraints.

  ## Phase 1: Issue Retrieval
  
  1. Use `Developer.shell` to retrieve the full issue details using JSON:
     `gh issue view {{ issue_number }} --json title,body,comments`

  ## Phase 2: Parallel Codebase Research (ADVERSARIAL)
  
  Spawn 3 parallel researcher agents using `Summon.delegate` with `async: true`. 
  
  1. Researcher 1 (Integrity & Standards): Use `Analyze.analyze` on `devs/` and `src/`. Identify "Golden Rules" (SOA, Dumb Views).
  2. Researcher 2 (Security & Settings): Audit `src/settings/` and `devs/security-and-robustness.md`. Report on Privacy whitelisting and Slim-Sync impacts.
  3. Researcher 3 (Capability Audit): Use `Developer.shell` with `grep -r` to verify unified SDK signatures (@google/genai). **MANDATORY**: Research the SDK version to see if it ALREADY supports the feature (e.g. Multimodal) before allowing new dependencies.
  
  Wait for all researchers in parallel using `Summon.load`.

  ## Phase 3: Synthesis & Adversarial Check
  
  1. Synthesize results.
  2. **ADVERSARIAL CHALLENGE**: You MUST ask: "Why can't we solve this with Gemini's native API or our existing @google/genai SDK without adding the proposed libraries? Prove that @google/genai does NOT support this natively."

  ## Phase 4: Initial Draft (Planner)
  
  1. Delegate to the "planner" agent.
     - Use `{{ planner_provider }}` and `{{ planner_model }}` if provided.
  2. Instruct it to follow the **Red-Team Checklist** in `.goose/vault-intelligence-rules.md`.
  3. Prioritize "Leveraging existing pipelines" over adding new binary dependencies.
  
  ## Phase 5: Peer Review (Adversarial Reviewer)
  
  1. Delegate to a reviewer agent. 
     - Use `{{ reviewer_provider }}` and `{{ reviewer_model }}` if provided.
  2. **ADVERSARIAL EVALUATION**: Assume the plan is "rubbish." Flag any new `npm install` as a point of failure unless the Planner provided `grep` proof that the SDK doesn't support the feature.
  3. Evaluate: SOA integrity, UX quality, Technical Debt, Privacy, and Mobile OOM risks.
    
  ## Phase 6: Plan Revision (Planner)
  
  1. Delegate to the "planner" for a final unified plan.
     - Use `{{ planner_provider }}` and `{{ planner_model }}` if provided.
     - Reference ACTUAL file paths discovered by Researcher 3.
  
  ## Phase 7: File Output

  1. Save Final Plan to `.tasks/plan-issue-{{ issue_number }}.md`.
  2. Save Critique to `.tasks/review-issue-{{ issue_number }}.md`.
  3. Present summary and STOP.
