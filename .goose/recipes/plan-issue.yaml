name: Develop Implementation Plan for Issue
description: Parallelizes codebase research, delegates planning, gets a peer review, and refine the plan using specialized agents.

parameters:
  - name: issue_number
    description: The GitHub issue number to plan for.
    required: true
  - name: planner_provider
    description: Model provider for the planning agent.
    default: "google"
  - name: planner_model
    description: Model name for the planning agent.
    default: "gemini-flash-latest"
  - name: reviewer_provider
    description: Model provider for the reviewing agent.
    default: "google"
  - name: reviewer_model
    description: Model name for the reviewing agent.
    default: "gemini-flash-latest"

steps:
  ## Phase 1: Context & Keyword Extraction
  
  1. Use `Developer.shell` to retrieve issue #{{ issue_number }}.
  2. **MANDATORY**: Extract the primary technical identifiers and domain-specific keywords from the issue.
  3. **MANDATORY**: Use `Summarize.summarize` on `package.json` with the extracted keywords to identify the "Core Domain SDK."
  4. **MANDATORY**: Read `AGENTS.md` and `.goose/vault-intelligence-rules.md`.

  ## Phase 2: Sequential Capability Audit
  
  Establish the "State of the Repository" dynamically based on the extracted keywords.
  
  1. Audit (Integrity): Read `devs/ARCHITECTURE_AND_STANDARDS.md`. Identify the "Owner Service" for this feature.
  2. Audit (Context): Use `Analyze.analyze` on `src/services/` to understand the data flow of the identified service.
  3. Audit (Compliance): Cite the specific document in `devs/` (e.g., `security-and-robustness.md`) that defines the constraints for this feature.

  ## Phase 3: Adversarial Planning (The First Draft)
  
  1. Delegate to the "planner" agent.
     - Use `{{ planner_provider }}` and `{{ planner_model }}` if provided.
  2. Instructions: Develop a detailed implementation plan for issue #{{ issue_number }}.
     - **Constraint**: You MUST score your plan against the **Four Pillars in AGENTS.md** before outputting.
     - **Constraint**: Identify any potential "Architectural Red-Flags" and explain your mitigation.
  3. Save the plan to `.tasks/plan-issue-{{ issue_number }}.md`.

  ## Phase 4: Adversarial Reviewer (The High Bar)
  
  1. Delegate to the "reviewer" agent.
     - Use `{{ reviewer_provider }}` and `{{ reviewer_model }}` if provided.
  2. Instructions: Assume the planning draft is "Architecturally Unsound." Grade it against the **Excellence Checklist** in `AGENTS.md`.
     - Specifically verify compliance with the **Four Pillars**.
     - Actively look for "Hidden Dependencies" and "Main-Thread Bloat."
  3. Save the critique to `.tasks/review-issue-{{ issue_number }}.md`.

  ## Phase 5: Refinement & Verification
  
  1. Based on the review, refine the implementation plan. 
  2. Perform a final `grep` to verify any contested SDK signatures or code paths.
  3. Save the final verified plan to `.tasks/plan-issue-{{ issue_number }}.md`.
