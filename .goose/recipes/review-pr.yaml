version: 1.0.0
title: "Review Renovate Pull Request"
description: "Carefully review, research, and verify a Renovate dependency pull request."
parameters:
  - key: pr_number
    input_type: string
    requirement: required
    description: "The GitHub pull request number to review."
prompt: "Please review, verify, and summarize PR {{ pr_number }}"
extensions:
  - type: builtin
    name: developer
  - type: builtin
    name: code_execution
  - type: builtin
    name: extensionmanager
  - type: builtin
    name: analyze
  - type: builtin
    name: todo
activities:
  - "Review PR {{ pr_number }}"
instructions: |
  You are an expert developer assistant. Follow these steps meticulously.

  ### Strict Execution Protocol
  - **No Pre-flight Checks**: Do NOT execute environment verification commands (e.g., `which node`, `ls`, `env`, `pwd`) unless a required command fails with a "not found" or permission error.
  - **Trust the Toolchain**: Assume `npm`, `gh`, and `git` are correctly configured and available in the PATH.
  - **Atomic Steps**: Group related shell commands into single execution blocks to maintain momentum.
  - **No Hallucinations**: If a command fails, report the exact error. Do not speculate about "Hermit" or other environment wrappers unless they appear in the stderr.
  - **Script Integrity**: If using `Developer.execute`, treat TypeScript errors (e.g., `TS2339`) as bugs in your own script logic. Do NOT blame the environment for compilation failures.
  - **Safe Types**: When writing scripts for `Developer.execute`, always initialize objects with explicit types (e.g., `const results: any = {}`) to avoid strict property checking failures during sandbox compilation.
  - **Prefer `npm run` commands always**: Watch yourself and when you start using lower-level commands, e.g, `npx vitest run`, STOP AND THINK: it is probably your sandbox or terminal environment that is confused. Review your environment first.

  1. Check for uncommitted changes and switch to the PR branch
     Execute the following shell command to check out PR {{ pr_number }}:
     `if [ -n "$(git status --porcelain)" ]; then echo "❌ Error: You have uncommitted changes. Please stash or commit them before running this workflow."; exit 1; fi && gh pr checkout {{ pr_number }} && git pull origin $(git branch --show-current)`
     
  2. Rebase on main (Local verification only)
     This rebase is for local verification only. DO NOT PUSH the rebased branch to origin unless you intend to "take over" the PR and stop Renovate updates.
     If rebase fails due to conflicts, abort immediately to keep the workspace clean. Execute:
     `git fetch origin main && (git rebase origin/main || (echo "❌ Merge Conflict detected! Aborting rebase to clean up..." && git rebase --abort && exit 1))`
     If this step fails with a merge conflict, instruct the user to go to the Renovate Dependency Dashboard in GitHub and tick the checkbox to rebase/retry the PR.
     
  3. Identify changed dependencies
     Parse the PR body or `package.json` diff to identify exactly which packages are being upgraded.
     
  4. Research release notes and breaking changes
     Search the web or the package's changelogs. Look for "breaking changes", "migration guide", or security fixes.
     
  5. Codebase impact analysis
     Use your tools to search the codebase (e.g., `grep` or search features) to find usage of affected APIs if breaking changes are suspected.
     
  6. Automated Verification Suite
     Run the tests using `npm ci` to respect the lockfile and avoid unnecessary changes. Execute:
     `npm ci && npm run build && npm test && npm run lint && npm run docs:build`
     
  7. Report Findings
     Do NOT create artifacts in the repository. Summarize your research and verification results explicitly in the chat.
     Post the summary as a comment on the PR using `gh pr comment`.
     
     a. Write your detailed findings to a temporary file named `pr_summary.txt`. 
        Include a section: "**Manual Verification**: Please manually load the plugin in Obsidian to check for UI regressions, as automated tests cannot cover this."
        If this is a security fix, include a section: "**Changelog Entry**: Provide the entry for the `### Security` section, including the CVE/GHSA ID."
     b. Execute the following to post the comment and clean up:
        `gh pr comment {{ pr_number }} --body-file pr_summary.txt && rm pr_summary.txt`
        
  8. Cleanup (Optional)
     If the review is successful and you are NOT merging immediately, switch back to main. Execute:
     `git checkout main && git branch -D -`
