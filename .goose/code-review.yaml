version: "1.0.0"
title: "Code and Architecture Review"
description: "Evaluates Node.js, Electron, and Obsidian plugin codebase for best practices."
extensions:
  - type: builtin
    name: developer
    timeout: 300
    bundled: true
parameters:
  - name: "checklist"
    description: "Path to the approved architectural checklist from the orchestrator."
    required: true
instructions: |
  ### 1. AUDIT PREPARATION
  1. **Review File**: Initialize `.tasks/code-review-[TIMESTAMP].md`.
  2. **Checklist Grounding**: Read the architectural checklist from the file with the path provided in the `checklist` parameter and use it as the foundation for your audit.

  ### 2. EXECUTION
  1. Evaluate the codebase against every item in the provided checklist.
  2. **Specific Scan**: Audit for `any` abuse, God Objects, Arrow Code, and fragile Regex.
  3. **RPI Handoff**: Document every finding with a specific implementation plan in the Review File.
  4. **Strict Safety**: The use of `any` is an automatic Architectural Failure.
